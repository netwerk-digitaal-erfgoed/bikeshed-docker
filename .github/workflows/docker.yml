name: Push image to Docker Hub

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Derive Bikeshed version
        id: version
        run: |
          version=$(grep -oP '(?<===)\S+' requirements.txt)
          echo "full=$version" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            netwerkdigitaalerfgoed/bikeshed:${{ steps.version.outputs.full }}
            netwerkdigitaalerfgoed/bikeshed:${{ steps.version.outputs.major }}
            netwerkdigitaalerfgoed/bikeshed:latest

      - name: Create GitHub release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: gh release create "v$VERSION" --title "v$VERSION" --generate-notes || true
        env:
          VERSION: ${{ steps.version.outputs.full }}
          GH_TOKEN: ${{ github.token }}
